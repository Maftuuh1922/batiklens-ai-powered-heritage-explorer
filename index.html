<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/kawung-icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1A1F3A" />
  <meta name="description" content="BatikLens — AI-powered Indonesian batik heritage explorer. Scan, learn, and collect motifs from across the archipelago." />
  <meta property="og:title" content="BatikLens — Heritage Vision Explorer" />
  <meta property="og:description" content="Scan batik motifs, earn XP, build a daily streak, and unlock badges as you explore Indonesia's wastra heritage." />
  <meta property="og:type" content="website" />
  <title>BatikLens — Heritage Vision Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400&family=Caveat:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script>
    window.addEventListener('error', (event) => {
      const isOurAppError = event.filename && event.filename.startsWith(window.location.origin);
      if (isOurAppError) {
        navigator.sendBeacon('/api/client-errors', JSON.stringify({
          message: event.message,
          url: window.location.href,
          userAgent: navigator.userAgent,
          source: event.filename,
          lineno: event.lineno,
          colno: event.colno,
          stack: event.error ? event.error.stack : null,
          timestamp: new Date().toISOString()
        }));
      }
    }, true);
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
